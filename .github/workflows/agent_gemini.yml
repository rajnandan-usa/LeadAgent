name: Rajnandan AI Agent Gemini

on:
  schedule:
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install google-generativeai requests openpyxl

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python agent_gemini.py run

      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: leads-${{ github.run_number }}
          path: leads_*.xlsx
          retention-days: 30

      - name: Save Database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: database-${{ github.run_number }}
          path: agent_leads.db
          retention-days: 30
